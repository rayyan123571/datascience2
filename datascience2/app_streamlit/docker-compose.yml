services:
  loan-prediction-app:
    build:
      # Use the project root as context so the Dockerfile can pull in
      # requirements.txt and the data/ folder.
      context: ..
      dockerfile: app_streamlit/Dockerfile
    container_name: loan-prediction-streamlit
    ports:
      - "8501:8501"
    volumes:
      - ./models:/app/models
      - ../data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
